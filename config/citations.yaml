# =============================================================================
# BFX Skills — Tool Citation Database
# =============================================================================
# Used by cite-bfx to generate citation sheets for completed projects.
# Format: bibtex key, APA citation string, DOI, tool URL, recommended note.
# Add entries when new tools are incorporated into the library.

fastp:
  key: chen2018fastp
  tool: fastp
  version_field: true
  short: "fastp (Chen et al., 2018)"
  apa: >
    Chen, S., Zhou, Y., Chen, Y., & Gu, J. (2018). fastp: an ultra-fast
    all-in-one FASTQ preprocessor. Bioinformatics, 34(17), i884–i890.
  doi: 10.1093/bioinformatics/bty560
  url: https://github.com/OpenGene/fastp
  note: "Cite for any QC/adapter-trimming step using fastp."
  bibtex: |
    @article{chen2018fastp,
      title={fastp: an ultra-fast all-in-one FASTQ preprocessor},
      author={Chen, Shifu and Zhou, Yanqing and Chen, Yaru and Gu, Jia},
      journal={Bioinformatics},
      volume={34},
      number={17},
      pages={i884--i890},
      year={2018},
      publisher={Oxford University Press},
      doi={10.1093/bioinformatics/bty560}
    }

