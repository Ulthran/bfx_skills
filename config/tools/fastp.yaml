# =============================================================================
# Tool Profile: fastp
# Stage: qc
# =============================================================================
name: fastp
stage: qc
version: "0.23.4"

# Environment — set one of conda_env or docker_image; other can be null
conda_env: envs/fastp.yaml
docker_image: staphb/fastp:0.23.4

# Which env manager to use (overrides global if set; null = use global default)
activation: null

# Snakemake rule template to use (relative to templates/rules/)
rule_template: qc/fastp.smk

# Command template (Snakemake-style placeholders)
# Available: {input.r1}, {input.r2}, {output.r1}, {output.r2},
#            {output.json}, {output.html}, {threads}, {params.*}
command_template: >
  fastp
  --in1 {input.r1} --out1 {output.r1}
  --in2 {input.r2} --out2 {output.r2}
  --json {output.json} --html {output.html}
  --thread {threads}
  --length_required {params.min_length}
  --low_complexity_filter --complexity_threshold {params.complexity_threshold}
  --detect_adapter_for_pe
  {params.extra}

# Default parameters (can be overridden in project workflow/config.yaml)
default_params:
  threads: 8
  min_length: 50
  complexity_threshold: 30
  extra: ""

# Resource estimates for SLURM
resources:
  mem_mb: 8000
  runtime_min: 120       # wall time estimate per sample
  cpus: 8

# Output files produced (relative names, used by bfx-dag for DAG construction)
outputs:
  - r1: "{sample}_R1_qc.fastq.gz"
  - r2: "{sample}_R2_qc.fastq.gz"
  - json: "{sample}_fastp.json"
  - html: "{sample}_fastp.html"

# QC thresholds — used by bfx-analyze to flag problems
qc_thresholds:
  min_passing_rate: 0.70        # fail if <70% reads pass filters
  max_duplication_rate: 0.50    # warn if >50% duplication
  min_insert_size: 100          # warn if median insert size drops below this
